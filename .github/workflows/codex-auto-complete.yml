name: Codex Auto Complete

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  mark-task-complete:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'codex-auto/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract task ID
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const taskId =
              pr.title.match(/\[([A-Z]{2}-\d{2})\]/)?.[1] ||
              pr.body?.match(/Task ID:\s*([A-Z]{2}-\d{2})/i)?.[1] ||
              pr.head.ref.match(/([a-z]{2}-\d{2})/i)?.[1]?.toUpperCase() ||
              '';
            core.setOutput('task_id', taskId);

      - name: Update TODO.md status
        if: steps.meta.outputs.task_id != ''
        run: node scripts/codex-mark-task-complete.cjs --task-id "${{ steps.meta.outputs.task_id }}"

      - name: Commit TODO.md update
        if: steps.meta.outputs.task_id != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TODO.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: mark ${{ steps.meta.outputs.task_id }} completed"
          git push origin HEAD:${{ github.event.repository.default_branch }}
