name: Codex Queue

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: codex-queue
  cancel-in-progress: false

jobs:
  sync-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync queue issue from TODO.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const todo = fs.readFileSync('TODO.md', 'utf8');
            const scheduleMatch = todo.match(/## Codex Queue Schedule[\s\S]*?(?=\n## 1\. Quick Wins)/);
            const queueSchedule = scheduleMatch ? scheduleMatch[0].trim() : 'Codex queue schedule section was not found in TODO.md.';
            const detailSections = [...todo.matchAll(/### Task ([A-Z]{2}-\d{2}): ([^\n]+)\n([\s\S]*?)(?=\n### Task [A-Z]{2}-\d{2}:|\n*$)/g)];
            const taskDetails = new Map(
              detailSections.map(match => {
                const [, id, title, block] = match;
                const findField = label => block.match(new RegExp(`- ${label}: ([^\\n]+)`))?.[1]?.trim() ?? '';
                return [
                  id,
                  {
                    id,
                    title: title.trim(),
                    why: findField('Why it matters'),
                    files: findField('Affected files'),
                    risk: findField('Risk level'),
                    effort: findField('Estimated effort'),
                    prompt: findField('Suggested Codex prompt').replace(/^"|"$/g, ''),
                  },
                ];
              })
            );

            const parts = new Intl.DateTimeFormat('en-CA', {
              timeZone: 'Asia/Bangkok',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              hour12: false,
            }).formatToParts(new Date());

            const getPart = type => parts.find(part => part.type === type)?.value ?? '';
            const localDate = `${getPart('year')}-${getPart('month')}-${getPart('day')}`;
            const localTime = `${getPart('hour')}:${getPart('minute')}`;
            const startHour = Math.floor(Number(getPart('hour')) / 6) * 6;
            const endHour = (startHour + 6) % 24;
            const currentSlot = `${String(startHour).padStart(2, '0')}:00-${String(endHour).padStart(2, '0')}:00 Asia/Bangkok`;
            const cycleNumber = Math.floor(startHour / 6) + 1;
            const cycleHourStart = cycleNumber === 1 ? '0' : String(startHour);
            const cycleHourEnd = String(startHour + 6);
            const currentCycle = `Cycle ${cycleNumber} (Hours ${cycleHourStart}-${cycleHourEnd})`;
            const cycleSectionRegex = new RegExp(`### ${currentCycle.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}[\\s\\S]*?(?=\\n### Cycle |\\n## Per-Cycle Rule|$)`);
            const cycleSection = todo.match(cycleSectionRegex)?.[0] ?? '';
            const cycleTaskIds = [...cycleSection.matchAll(/- ([A-Z]{2}-\d{2}) /g)].map(match => match[1]);
            const primaryTask = cycleTaskIds[0] ? taskDetails.get(cycleTaskIds[0]) : null;
            const fallbackTask = cycleTaskIds[1] ? taskDetails.get(cycleTaskIds[1]) : null;
            const commentMarker = `<!-- codex-queue:${localDate}:${currentSlot} -->`;

            const body = [
              '# Codex Queue',
              '',
              `Last sync: ${localDate} ${localTime} (${currentSlot})`,
              `Current cycle: ${currentCycle}`,
              '',
              'This issue is refreshed automatically every 6 hours from `TODO.md`.',
              '',
              queueSchedule,
              '',
              'Source of truth: `TODO.md` in the repository root.',
            ].join('\n');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Codex Queue';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            let existing = issues.find(issue => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              existing = created;
              core.info(`Created issue #${created.number}`);
            }

            if (existing && primaryTask) {
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: existing.number,
                per_page: 100,
              });

              const alreadyCommented = comments.some(comment => comment.body?.includes(commentMarker));
              if (!alreadyCommented) {
                const commentBody = [
                  commentMarker,
                  `## Semi-Auto Task Prompt`,
                  '',
                  `Cycle: ${currentCycle}`,
                  `Slot: ${currentSlot}`,
                  `Primary task: ${primaryTask.id} ${primaryTask.title}`,
                  `Fallback task: ${fallbackTask ? `${fallbackTask.id} ${fallbackTask.title}` : 'None'}`,
                  '',
                  `Primary risk: ${primaryTask.risk || 'unknown'}`,
                  `Primary effort: ${primaryTask.effort || 'unknown'}`,
                  '',
                  `Why it matters: ${primaryTask.why || '-'}`,
                  `Affected files: ${primaryTask.files || '-'}`,
                  '',
                  `Suggested Codex prompt:`,
                  '```text',
                  primaryTask.prompt || `Implement only ${primaryTask.id} from TODO.md. Keep scope narrow. Run lint/build and summarize results.`,
                  '```',
                  '',
                  `Fallback Codex prompt:`,
                  '```text',
                  fallbackTask?.prompt || (fallbackTask ? `Implement only ${fallbackTask.id} from TODO.md. Keep scope narrow. Run lint/build and summarize results.` : 'No fallback task assigned for this cycle.'),
                  '```',
                  '',
                  `Verification checklist:`,
                  '- Run `npm run lint`',
                  '- Run `npm run build`',
                  '- Run available tests if the repo defines them',
                  '- Post a short summary with scope, results, and blockers',
                ].join('\n');

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: commentBody,
                });
                core.info(`Posted semi-auto comment for ${currentCycle}`);
              } else {
                core.info(`Skipped comment because ${currentCycle} for ${currentSlot} was already posted.`);
              }
            }
