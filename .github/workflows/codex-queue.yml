name: Codex Queue

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: codex-queue
  cancel-in-progress: false

jobs:
  sync-queue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect open automation PR task IDs
        id: open-prs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const taskIds = [];
            for (const pull of pulls) {
              if (!pull.head.ref.startsWith('codex-auto/')) {
                continue;
              }
              const fromTitle = pull.title.match(/\[([A-Z]{2}-\d{2})\]/)?.[1];
              const fromBranch = pull.head.ref.match(/([a-z]{2}-\d{2})/i)?.[1]?.toUpperCase();
              const taskId = fromTitle || fromBranch;
              if (taskId) {
                taskIds.push(taskId);
              }
            }

            core.setOutput('task_ids', taskIds.join(','));

      - name: Select next queued task
        id: select
        env:
          OPEN_PR_TASK_IDS: ${{ steps.open-prs.outputs.task_ids }}
        run: node scripts/codex-select-task.cjs --output selected-task.json

      - name: Sync queue issue
        uses: actions/github-script@v7
        env:
          OPEN_TASK_IDS: ${{ steps.open-prs.outputs.task_ids }}
          HAS_TASK: ${{ steps.select.outputs.has_task }}
          TASK_ID: ${{ steps.select.outputs.task_id }}
          TASK_TITLE: ${{ steps.select.outputs.task_title }}
          AFFECTED_FILES: ${{ steps.select.outputs.affected_files }}
        with:
          script: |
            const fs = require('fs');

            const parts = new Intl.DateTimeFormat('en-CA', {
              timeZone: 'Asia/Bangkok',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
              hour: '2-digit',
              minute: '2-digit',
              hour12: false,
            }).formatToParts(new Date());

            const getPart = type => parts.find(part => part.type === type)?.value ?? '';
            const localDate = `${getPart('year')}-${getPart('month')}-${getPart('day')}`;
            const localTime = `${getPart('hour')}:${getPart('minute')}`;
            const claimedTasks = String(process.env.OPEN_TASK_IDS || '')
              .split(',')
              .map(item => item.trim())
              .filter(Boolean);

            const todo = fs.readFileSync('TODO.md', 'utf8');
            const detailSections = [...todo.matchAll(/### Task ([A-Z]{2}-\d{2}): ([^\n]+)\n([\s\S]*?)(?=\n### Task [A-Z]{2}-\d{2}:|\n*$)/g)];
            const taskDetails = new Map(
              detailSections.map(match => {
                const [, id, title, block] = match;
                const findField = label => block.match(new RegExp(`- ${label}: ([^\\n]+)`))?.[1]?.trim() ?? '';
                return [
                  id,
                  {
                    id,
                    title: title.trim(),
                    status: findField('Status'),
                    why: findField('Why it matters'),
                    files: findField('Affected files'),
                    risk: findField('Risk level'),
                    effort: findField('Estimated effort'),
                    prompt: findField('Suggested Codex prompt').replace(/^"|"$/g, ''),
                  },
                ];
              })
            );

            const nextTask = process.env.HAS_TASK === 'true'
              ? taskDetails.get(process.env.TASK_ID)
              : null;

            const claimedLines = claimedTasks.length > 0
              ? claimedTasks.map(taskId => {
                  const task = taskDetails.get(taskId);
                  return `- ${taskId} ${task ? task.title : ''}`.trimEnd();
                })
              : ['- None'];

            const body = [
              '# Codex Queue',
              '',
              `Last sync: ${localDate} ${localTime} (Asia/Bangkok)`,
              'Automation cadence: every 3 hours',
              '',
              'This issue tracks the real automation queue used by the draft PR workflow.',
              '',
              '## Next Task',
              nextTask
                ? `- ${nextTask.id} ${nextTask.title}`
                : '- No eligible task is currently available.',
              nextTask?.risk ? `- Risk: ${nextTask.risk}` : '',
              nextTask?.effort ? `- Effort: ${nextTask.effort}` : '',
              nextTask?.why ? `- Why it matters: ${nextTask.why}` : '',
              nextTask?.files ? `- Affected files: ${nextTask.files}` : '',
              '',
              '## Claimed By Open Automation PRs',
              ...claimedLines,
              '',
              '## Workflow Behavior',
              '- The auto-PR workflow selects the first unfinished task in `TODO.md` that is not already claimed by an open automation PR.',
              '- The AI step is skipped if quota guard blocks the run or if the model cannot produce a safe bounded patch.',
              '- A draft PR is opened only after `check:utf8`, `lint`, and `build` pass.',
              '',
              'Source of truth: `TODO.md` in the repository root.',
            ].filter(Boolean).join('\n');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Codex Queue';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            let existing = issues.find(issue => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              existing = created;
              core.info(`Created issue #${created.number}`);
            }
